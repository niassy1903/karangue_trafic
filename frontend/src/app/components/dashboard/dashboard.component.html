<div class="container-fluid">
  <div class="row flex-nowrap">
    <!-- Sidebar -->
    <nav class="col-12 col-md-2 col-lg-2 px-0 bg-light border-end min-vh-100">
      <app-sidebar></app-sidebar>
    </nav>

    <!-- Main Content -->
    <main class="col-12 col-md-10 col-lg-10 ms-sm-auto px-0 px-md-4">
      <app-navbar></app-navbar>

      <!-- Dashboard Content -->
      <div class="container mt-4">
        <!-- Carte Map -->
        <div class="card mb-4">
          <app-map></app-map>
        </div>

        <!-- Row for Infractions and Alerts -->
        <div class="row">
          <!-- Colonne Gauche : Infractions et Historique -->
          <div class="col-12 col-md-8 d-flex flex-column mb-4 mb-md-0">
            <!-- Total Infractions -->
            <div class="card card-infraction-chart mb-3">
              <div class="card-body text-center">
                <h3 class="card-title">Total Infractions</h3>
                <i class="fas fa-car-crash fa-4x text-danger"></i>
                <span class="fs-1">{{ totalInfractions }}</span>
              </div>
            </div>
            <!-- Historique des Infractions -->
            <div class="card flex-grow-1">
              <div class="card-body">
                <h3 class="card-title">Historique des infractions</h3>
                <canvas #infractionChart></canvas>
              </div>
            </div>
          </div>

          <!-- Colonne Droite : Liste des alertes -->
        <div class="col-12 col-md-4">
          <div class="card h-100 shadow-sm border-0 rounded-4 bg-light alert-card">
            <div class="card-body">
              <h3 class="card-title text-center mb-4 text-gradient-orange fw-bold">🚨 Liste des alertes</h3>

              <div class="list-group list-group-flush alert-list">
                <div
                  class="list-group-item d-flex justify-content-between align-items-center border-0 rounded-3 mb-2 shadow-sm bg-white"
                  *ngFor="let alert of alerts"
                >
                  <div>
                    <strong class="text-dark">{{ alert.nom }}</strong>, {{ alert.matricule }}<br />
                    <span class="text-muted small">Zone {{ alert.zone }}</span>
                    <p class="mb-0 text-danger fw-semibold">⚠️ Excès de vitesse : {{ alert.vitesse }} km/h</p>
                  </div>
                  <i class="fas fa-arrow-right text-secondary"></i>
                </div>
              </div>

              <nav aria-label="Navigation pagination alertes" class="mt-4">
                <ul class="pagination justify-content-center">
                  <li class="page-item" [class.disabled]="currentPage === 1">
                    <button class="page-link" (click)="goToPage(currentPage - 1)">Précédent</button>
                  </li>

                  <li class="page-item" *ngFor="let page of pages" [class.active]="page === currentPage">
                    <button class="page-link" (click)="goToPage(page)">
                      {{ page }}
                    </button>
                  </li>

                  <li class="page-item" [class.disabled]="currentPage === totalPages">
                    <button class="page-link" (click)="goToPage(currentPage + 1)">Suivant</button>
                  </li>
                </ul>
              </nav>
            </div>
          </div>
        </div>

        </div>
      </div>
    </main>
  </div>

  <!-- Bouton de retour en haut -->
  <button 
    class="btn btn-primary btn-scroll-to-top" 
    (click)="scrollToTop()" 
    [ngStyle]="{'display': showScrollTop ? 'block' : 'none'}"
    style="position: fixed; bottom: 30px; right: 30px; z-index: 1050;">
    <i class="fas fa-arrow-up"></i>
  </button>
</div>
