<!-- dashboard.component.html -->
<div class="flex h-screen bg-gray-100 overflow-hidden">

  <!-- Sidebar -->
  <app-sidebar [class.sidebar-collapsed]="isSidebarCollapsed" class="transition-all duration-300"></app-sidebar>

  <!-- Main content -->
  <div class="flex-1 flex flex-col overflow-auto">
    
    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Dashboard content -->
    <div class="p-6 space-y-6">

      <!-- Stat Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div *ngFor="let card of statsCards"
             class="bg-white shadow-lg rounded-2xl p-6 flex items-center justify-between transform hover:scale-105 transition-all duration-300 cursor-pointer">
          <div>
            <p class="text-gray-500 font-semibold">{{ card.title }}</p>
            <p class="text-2xl font-bold text-gray-800 mt-1">{{ card.count }}</p>
          </div>
          <div class="text-orange-500 text-4xl">
            <i class="fas {{ card.icon }}"></i>
          </div>
        </div>
      </div>

      <!-- History + Chart -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Historique -->
        <div class="lg:col-span-2 bg-white shadow-lg rounded-2xl p-6 overflow-auto">
          <h2 class="text-xl font-bold text-gray-800 mb-4">Historique</h2>
          <table class="min-w-full divide-y divide-gray-200 text-left">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-2 text-gray-600 font-medium">Matricule</th>
                <th class="px-4 py-2 text-gray-600 font-medium">Nom</th>
                <th class="px-4 py-2 text-gray-600 font-medium">Date</th>
                <th class="px-4 py-2 text-gray-600 font-medium">Heure</th>
                <th class="px-4 py-2 text-gray-600 font-medium">Action</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
              <tr *ngFor="let item of paginatedData" class="hover:bg-gray-50 transition">
                <td class="px-4 py-2">{{ item.utilisateur.matricule }}</td>
                <td class="px-4 py-2">{{ item.utilisateur.prenom }} {{ item.utilisateur.nom }}</td>
                <td class="px-4 py-2">{{ item.date }}</td>
                <td class="px-4 py-2">{{ item.heure }}</td>
                <td class="px-4 py-2">{{ item.action }}</td>
              </tr>
            </tbody>
          </table>

          <!-- Pagination -->
          <div class="flex justify-center items-center mt-4 space-x-2">
            <button (click)="prevPage()" [disabled]="currentPage === 1"
                    class="px-3 py-1 rounded-lg bg-gray-200 hover:bg-gray-300 disabled:opacity-50 transition">&lt;&lt;</button>
            <button *ngFor="let page of pages" (click)="goToPage(page)"
                    [class.bg-orange-500]="page === currentPage"
                    [class.text-white]="page === currentPage"
                    class="px-3 py-1 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
              {{ page }}
            </button>
            <button (click)="nextPage()" [disabled]="currentPage === totalPages"
                    class="px-3 py-1 rounded-lg bg-gray-200 hover:bg-gray-300 disabled:opacity-50 transition">&gt;&gt;</button>
          </div>
        </div>

        <!-- Graphique -->
        <div class="bg-white shadow-lg rounded-2xl p-6 flex flex-col justify-center">
          <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">Répartition des utilisateurs</h2>
          <div class="flex-1">
            <app-pie-chart></app-pie-chart>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
