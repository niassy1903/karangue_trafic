<div class="flex h-screen bg-gray-100 overflow-hidden">

  <!-- Sidebar -->
  <app-sidebar class="transition-all duration-300"></app-sidebar>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-auto">

    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Formulaire Modifier -->
    <div class="container mx-auto mt-8 px-4">

      <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-orange-500 to-orange-600 text-white text-center font-bold text-2xl py-4">
          Modifier l'Utilisateur
        </div>

        <!-- Form Body -->
        <div class="p-6 space-y-6">
          <form [formGroup]="modifierForm" (ngSubmit)="onSubmit()" class="space-y-6">

            <!-- Prénom & Nom -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-gray-700 font-semibold mb-1">Prénom</label>
                <input formControlName="prenom" type="text" placeholder="Saisissez votre prénom"
                       class="w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition" />
                <div *ngIf="submitted && f['prenom'].errors" class="text-red-500 mt-1 text-sm">Prénom requis (min 2 lettres)</div>
              </div>
              <div>
                <label class="block text-gray-700 font-semibold mb-1">Nom</label>
                <input formControlName="nom" type="text" placeholder="Saisissez votre nom"
                       class="w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition" />
                <div *ngIf="submitted && f['nom'].errors" class="text-red-500 mt-1 text-sm">Nom requis (min 2 lettres)</div>
              </div>
            </div>

            <!-- Adresse & Téléphone -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-gray-700 font-semibold mb-1">Adresse</label>
                <input formControlName="adresse" type="text" placeholder="Saisissez votre adresse"
                       class="w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition" />
                <div *ngIf="submitted && f['adresse'].errors" class="text-red-500 mt-1 text-sm">Adresse requise</div>
              </div>
              <div>
                <label class="block text-gray-700 font-semibold mb-1">Téléphone</label>
                <input formControlName="telephone" type="text" placeholder="Saisissez votre téléphone"
                       class="w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition" />
                <div *ngIf="submitted && f['telephone'].errors" class="text-red-500 mt-1 text-sm">Téléphone invalide</div>
                <div *ngIf="errorMessages.telephone" class="text-red-500 mt-1 text-sm">{{ errorMessages.telephone }}</div>
              </div>
            </div>

            <!-- Email & Rôle -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-gray-700 font-semibold mb-1">Email</label>
                <input formControlName="email" type="email" placeholder="Saisissez votre email"
                       class="w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition" />
                <div *ngIf="submitted && f['email'].errors" class="text-red-500 mt-1 text-sm">Email invalide</div>
                <div *ngIf="errorMessages.email" class="text-red-500 mt-1 text-sm">{{ errorMessages.email }}</div>
              </div>
              <div>
                <label class="block text-gray-700 font-semibold mb-1">Rôle</label>
                <select formControlName="role"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-orange-400 transition">
                  <option value="">Sélectionnez un rôle</option>
                  <option value="agent de sécurité">Agent de sécurité</option>
                  <option value="administrateur">Administrateur</option>
                </select>
                <div *ngIf="submitted && f['role'].errors" class="text-red-500 mt-1 text-sm">Rôle requis</div>
              </div>
            </div>

            <!-- Buttons -->
            <div class="flex flex-wrap justify-center gap-4 mt-6">
              <button type="button" (click)="goBack()"
                      class="w-48 px-4 py-2 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold rounded-xl shadow-lg transition transform hover:scale-105">
                Retour
              </button>
              <button type="submit"
                      class="w-48 px-4 py-2 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white font-bold rounded-xl shadow-lg transition transform hover:scale-105">
                Mettre à jour
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
