<div class="flex h-screen bg-gray-100 overflow-hidden">

  <!-- Sidebar -->
  <app-sidebar class="transition-all duration-300"></app-sidebar>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-auto">

    <!-- Navbar -->
    <app-navbar></app-navbar>

    <!-- Container -->
    <div class="container mx-auto px-4 mt-8">

      <!-- Card Historique -->
      <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-orange-500 to-orange-600 text-white text-center font-bold text-2xl py-4">
          Historique des Amendes
        </div>

        <!-- Body -->
        <div class="p-6">

          <!-- Inputs inline -->
          <div class="flex flex-col md:flex-row gap-4 mb-6">

            <!-- Recherche -->
            <div class="flex items-center w-full md:w-1/3 bg-gray-100 rounded-xl shadow-sm hover:shadow-md transition p-2">
              <i class="fas fa-search text-gray-400 px-2"></i>
              <input 
                type="text" 
                placeholder="Recherche par plaque, prénom, nom" 
                class="bg-transparent focus:outline-none flex-1 px-2 py-1 text-gray-700"
                (input)="onSearchChange($event)">
            </div>

            <!-- Filtre par date -->
            <div class="flex items-center w-full md:w-1/3 bg-gray-100 rounded-xl shadow-sm hover:shadow-md transition p-2">
              <i class="fas fa-calendar-alt text-gray-400 px-2"></i>
              <input 
                type="date" 
                class="bg-transparent focus:outline-none flex-1 px-2 py-1 text-gray-700"
                [(ngModel)]="searchDate"
                (change)="onDateChange($event)"
                title="Filtrer par date">
            </div>

            <!-- Export Excel -->
            <div class="flex items-center w-full md:w-1/3 bg-gray-100 rounded-xl shadow-sm hover:shadow-md transition p-2">
              <i class="fas fa-file-excel text-green-500 px-2"></i>
              <select 
                class="flex-1 bg-transparent focus:outline-none text-gray-700 px-2 py-1"
                [(ngModel)]="selectedMonth"
                (change)="onMonthChange($event)">
                <option value="">Sélectionnez un mois</option>
                <option value="01/{{ currentYear }}">Janvier</option>
                <option value="02/{{ currentYear }}">Février</option>
                <option value="03/{{ currentYear }}">Mars</option>
                <option value="04/{{ currentYear }}">Avril</option>
                <option value="05/{{ currentYear }}">Mai</option>
                <option value="06/{{ currentYear }}">Juin</option>
                <option value="07/{{ currentYear }}">Juillet</option>
                <option value="08/{{ currentYear }}">Août</option>
                <option value="09/{{ currentYear }}">Septembre</option>
                <option value="10/{{ currentYear }}">Octobre</option>
                <option value="11/{{ currentYear }}">Novembre</option>
                <option value="12/{{ currentYear }}">Décembre</option>
              </select>
              <button 
                class="ml-2 bg-green-500 text-white px-4 py-1 rounded-xl shadow-md hover:bg-green-600 transition"
                (click)="exportToExcel()">
                <i class="fas fa-file-export"></i> Exporter
              </button>
            </div>

          </div>

          <!-- Message d'erreur -->
          <div *ngIf="noResultsMessage" class="bg-yellow-100 text-yellow-800 p-3 rounded-xl mb-4 shadow-inner">
            {{ noResultsMessage }}
          </div>

          <!-- Tableau -->
          <div class="overflow-x-auto">
            <table class="min-w-full bg-white divide-y divide-gray-200 shadow-lg rounded-xl overflow-hidden">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-4 py-2 text-gray-600 font-semibold uppercase tracking-wider">Plaque</th>
                  <th class="px-4 py-2 text-gray-600 font-semibold uppercase tracking-wider">Prénom et Nom</th>
                  <th class="px-4 py-2 text-gray-600 font-semibold uppercase tracking-wider">Date</th>
                  <th class="px-4 py-2 text-gray-600 font-semibold uppercase tracking-wider">Montant</th>
                  <th class="px-4 py-2 text-gray-600 font-semibold uppercase tracking-wider">Heure</th>
                  <th class="px-4 py-2 text-gray-600 font-semibold uppercase tracking-wider">Action</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-100">
                <tr *ngFor="let historique of filteredHistoriques | paginate: { itemsPerPage: 10, currentPage: currentPage }" 
                    class="hover:bg-orange-50 transition transform hover:scale-[1.01] cursor-pointer">
                  <td class="px-4 py-2">{{ historique.plaque_matriculation }}</td>
                  <td class="px-4 py-2">{{ historique.prenom }} {{ historique.nom }}</td>
                  <td class="px-4 py-2">{{ historique.date }}</td>
                  <td class="px-4 py-2 font-semibold text-orange-500">{{ historique.montant }} FCFA</td>
                  <td class="px-4 py-2">{{ historique.heure }}</td>
                  <td class="px-4 py-2">
                    <button class="bg-orange-500 text-white px-3 py-1 rounded-xl shadow-md hover:bg-orange-600 hover:scale-105 transition">
                      Détails
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination Tailwind -->
          <div class="flex justify-center mt-6">
            <nav class="inline-flex rounded-xl shadow-md bg-white">
              <button 
                (click)="changePage(currentPage - 1)" 
                [disabled]="currentPage === 1"
                class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-l-xl disabled:opacity-50 transition">← Précédent</button>

              <button *ngFor="let i of [].constructor(totalPages); let idx = index"
                      (click)="changePage(idx + 1)"
                      [class.bg-orange-500]="currentPage === (idx + 1)"
                      [class.text-white]="currentPage === (idx + 1)"
                      class="px-4 py-2 bg-gray-200 hover:bg-gray-300 transition">
                {{ idx + 1 }}
              </button>

              <button 
                (click)="changePage(currentPage + 1)" 
                [disabled]="currentPage === totalPages"
                class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-r-xl disabled:opacity-50 transition">Suivant →</button>
            </nav>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
